<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connecting WHOOP…</title>
  <style>
    body { 
      font-family: 'Rubik', sans-serif;
      background: #0A3228; color: #fff;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; margin: 0; flex-direction: column; gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #FFBE19; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: rgba(255,255,255,0.7); font-size: 14px; margin: 0; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Connecting your WHOOP…</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const mid = params.get('mid');
    const at  = params.get('at');
    const rt  = params.get('rt');
    const exp = params.get('exp');

    if (mid) localStorage.setItem('whoop_member_id', mid);
    if (at)  localStorage.setItem('whoop_access_token', at);
    if (rt)  localStorage.setItem('whoop_refresh_token', rt);
    if (exp) localStorage.setItem('whoop_token_expiry', exp);

    setTimeout(() => { window.location.href = '/wearable.html'; }, 800);
  </script>
</body>
</html>
