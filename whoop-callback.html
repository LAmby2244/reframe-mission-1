<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connecting WHOOP — Reframe</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Rubik', sans-serif;
      background: #F5E6CD;
      color: #0A3228;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(10,50,40,0.08);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(39,174,96,0.2);
      border-top-color: #27AE60;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; font-weight: 300; color: rgba(10,50,40,0.5); }
    .success { color: #27AE60; font-size: 40px; margin-bottom: 16px; display: none; }
    .error-msg { color: #C0392B; font-size: 14px; margin-top: 16px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <div class="success" id="success">✓</div>
    <h2 id="heading">Connecting your WHOOP</h2>
    <p id="subtext">Storing your connection securely...</p>
    <p class="error-msg" id="error"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://aoqjfqmlcccsosddqnws.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvcWpmcW1sY2Njc29zZGRxbndzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDM1MDMsImV4cCI6MjA5MDc3OTUwM30.oJUvoD8q2UI3kstkgOudwYKAm4Uet2KyY8CNAHSkP-g';

    function fail(msg) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('heading').textContent = 'Something went wrong';
      document.getElementById('subtext').textContent = 'Please try connecting again.';
      document.getElementById('error').textContent = msg;
      document.getElementById('error').style.display = 'block';
      setTimeout(() => { window.location.href = '/wearable.html'; }, 3000);
    }

    function succeed() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('success').style.display = 'block';
      document.getElementById('heading').textContent = 'WHOOP connected';
      document.getElementById('subtext').textContent = 'Loading your live data...';
      setTimeout(() => { window.location.href = '/wearable.html'; }, 1200);
    }

    (async function() {
      try {
        // Check for error in URL (OAuth failure)
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        if (error) {
          fail('WHOOP connection failed: ' + error);
          return;
        }

        // Token is stored server-side in Supabase whoop_connections
        // We just need to fetch it from there using the authenticated session
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { data: { session } } = await sb.auth.getSession();

        if (!session) {
          fail('Not signed in. Please sign in first.');
          return;
        }

        // Fetch the stored token from whoop_connections
        const { data: conn, error: connErr } = await sb
          .from('whoop_connections')
          .select('access_token, refresh_token, expires_at')
          .eq('user_id', session.user.id)
          .single();

        if (connErr || !conn) {
          fail('Could not retrieve WHOOP connection.');
          return;
        }

        // Store in localStorage for use by wearable.html
        const expiresAt = conn.expires_at
          ? new Date(conn.expires_at).getTime().toString()
          : (Date.now() + 24 * 60 * 60 * 1000).toString();

        localStorage.setItem('whoop_access_token',  conn.access_token);
        localStorage.setItem('whoop_refresh_token', conn.refresh_token || '');
        localStorage.setItem('whoop_token_expiry',  expiresAt);

        succeed();
      } catch(e) {
        fail(e.message);
      }
    })();
  </script>
</body>
</html>
