<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Rewrite Your Life · Purposeful Change</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F56914;
      --dark:   #0A3228;
      --mid:    #377364;
      --light:  #F5E6CD;
      --white:  #ffffff;
      --border: rgba(10,50,40,0.12);
      --muted:  rgba(10,50,40,0.45);
      --red:    #C0392B;
      --green:  #1a7a4a;
    }

    html, body {
      height: 100%;
      font-family: 'Rubik', sans-serif;
      background: var(--light);
      color: var(--dark);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* -- CARD -- */
    .card {
      background: var(--white);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 32px rgba(10,50,40,0.08);
    }

    /* -- LOGO -- */
    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 32px;
    }
    .logo-mark {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--dark);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark svg { width: 16px; height: 16px; fill: var(--orange); }
    .logo-text {
      font-size: 14px; font-weight: 700; color: var(--dark);
    }

    /* -- HEADING -- */
    h1 {
      font-size: 26px; font-weight: 700; color: var(--dark);
      margin-bottom: 6px; line-height: 1.2;
    }
    .subtitle {
      font-size: 14px; font-weight: 300; color: var(--muted);
      margin-bottom: 32px; line-height: 1.5;
    }

    /* -- FORM -- */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
      color: var(--dark); margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: 'Rubik', sans-serif;
      font-size: 15px; color: var(--dark);
      background: white;
      transition: border-color 0.2s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--orange);
    }
    .field input::placeholder { color: rgba(10,50,40,0.3); }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--dark);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Rubik', sans-serif;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn:hover { background: var(--mid); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error {
      font-size: 13px; color: var(--red);
      margin-top: 12px;
      display: none;
    }
    .error.show { display: block; }

    /* -- CONFIRM EMAIL PANEL -- */
    .confirm-panel {
      display: none;
      margin-top: 20px;
      padding: 20px;
      background: #f0faf4;
      border: 1.5px solid rgba(26,122,74,0.2);
      border-radius: 16px;
      text-align: center;
    }
    .confirm-panel.show { display: block; }
    .confirm-panel .confirm-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .confirm-panel h3 {
      font-size: 16px; font-weight: 700;
      color: var(--green);
      margin-bottom: 8px;
    }
    .confirm-panel p {
      font-size: 13px; font-weight: 300;
      color: var(--muted);
      line-height: 1.6;
    }
    .confirm-panel .resend-btn {
      margin-top: 14px;
      background: none;
      border: 1.5px solid var(--green);
      color: var(--green);
      font-family: 'Rubik', sans-serif;
      font-size: 13px; font-weight: 600;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .confirm-panel .resend-btn:hover {
      background: var(--green);
      color: white;
    }

    /* -- TOGGLE -- */
    .toggle {
      margin-top: 24px;
      text-align: center;
      font-size: 13px; font-weight: 300; color: var(--muted);
    }
    .toggle button {
      background: none; border: none;
      color: var(--orange); font-family: 'Rubik', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: underline;
    }

    /* -- BACK -- */
    .back {
      margin-top: 28px;
      text-align: center;
    }
    .back a {
      font-size: 13px; font-weight: 300; color: var(--muted);
      text-decoration: none;
    }
    .back a:hover { color: var(--dark); }

    /* -- SHAPE -- */
    .bg-shape {
      position: fixed; bottom: -80px; right: -80px;
      width: 360px; height: 360px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,105,20,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
  </style>
</head>
<body>

  <div class="bg-shape"></div>

  <div class="card">

    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 14 14"><circle cx="7" cy="7" r="5"/></svg>
      </div>
      <div class="logo-text">Rewrite Your Life</div>
    </div>

    <h1 id="heading">Welcome back</h1>
    <p class="subtitle" id="subheading">Sign in to continue your journey. Your reflections are waiting.</p>

    <div id="form-fields">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com"
               onkeydown="if(event.key==='Enter')submit()" />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••"
               onkeydown="if(event.key==='Enter')submit()" />
      </div>

      <button class="btn" id="btn" onclick="submit()">Sign in</button>

      <div class="error" id="error"></div>
    </div>

    <!-- Shown after sign-up when email confirmation is required -->
    <div class="confirm-panel" id="confirm-panel">
      <div class="confirm-icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="20" fill="#f0faf4"/>
          <path d="M10 15a2 2 0 012-2h16a2 2 0 012 2v11a2 2 0 01-2 2H12a2 2 0 01-2-2V15z" stroke="#1a7a4a" stroke-width="1.5" fill="none"/>
          <path d="M10 15l10 8 10-8" stroke="#1a7a4a" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h3>Check your email</h3>
      <p id="confirm-message">We sent a confirmation link to <strong id="confirm-email"></strong>. Open it to activate your account, then come back here to sign in.</p>
      <button class="resend-btn" onclick="resendConfirmation()">Resend email</button>
    </div>

    <div class="toggle" id="toggle-row">
      <span id="toggle-text">Don't have an account?</span>
      <button onclick="toggleMode()" id="toggle-btn">Create one</button>
    </div>

  </div>

  <div class="back">
    <a href="/index.html">Back to Rewrite Your Life</a>
  </div>

  <script>
    const SUPABASE_URL      = 'https://aoqjfqmlcccsosddqnws.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvcWpmcW1sY2Njc29zZGRxbndzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDM1MDMsImV4cCI6MjA5MDc3OTUwM30.oJUvoD8q2UI3kstkgOudwYKAm4Uet2KyY8CNAHSkP-g';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let isSignUp = false;
    let pendingEmail = '';

    // If already signed in -- go straight to destination
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) goToDestination();
    });

    function goToDestination() {
      const params = new URLSearchParams(window.location.search);
      const next   = params.get('next');
      const allowed = ['/start.html', '/dashboard.html', '/wearable.html',
                       '/use-it.html', '/mission-2.html', '/mission-3.html',
                       '/mission-6.html', '/study-dashboard.html'];
      if (next && allowed.some(p => next.startsWith(p))) {
        window.location.href = next;
      } else {
        window.location.href = '/start.html';
      }
    }

    function toggleMode() {
      isSignUp = !isSignUp;
      showFormFields();
      document.getElementById('heading').textContent      = isSignUp ? 'Create your account' : 'Welcome back';
      document.getElementById('subheading').textContent   = isSignUp
        ? 'Your reflections will be saved so you can return anytime.'
        : 'Sign in to continue your journey. Your reflections are waiting.';
      document.getElementById('btn').textContent          = isSignUp ? 'Create account' : 'Sign in';
      document.getElementById('toggle-text').textContent  = isSignUp ? 'Already have an account?' : "Don't have an account?";
      document.getElementById('toggle-btn').textContent   = isSignUp ? 'Sign in' : 'Create one';
      document.getElementById('error').classList.remove('show');
    }

    function showConfirmPanel(email) {
      pendingEmail = email;
      document.getElementById('confirm-email').textContent = email;
      document.getElementById('form-fields').style.display = 'none';
      document.getElementById('toggle-row').style.display  = 'none';
      document.getElementById('confirm-panel').classList.add('show');
      document.getElementById('heading').textContent    = 'Almost there';
      document.getElementById('subheading').textContent = 'One last step before you can start.';
    }

    function showFormFields() {
      document.getElementById('form-fields').style.display = '';
      document.getElementById('toggle-row').style.display  = '';
      document.getElementById('confirm-panel').classList.remove('show');
    }

    async function resendConfirmation() {
      if (!pendingEmail) return;
      const btn = document.querySelector('.resend-btn');
      btn.textContent = 'Sending...';
      btn.disabled = true;
      await sb.auth.resend({ type: 'signup', email: pendingEmail });
      btn.textContent = 'Sent!';
      setTimeout(() => { btn.textContent = 'Resend email'; btn.disabled = false; }, 3000);
    }

    async function submit() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('btn');
      const errEl    = document.getElementById('error');

      if (!email || !password) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.classList.add('show');
        return;
      }

      errEl.classList.remove('show');
      btn.textContent = isSignUp ? 'Creating account...' : 'Signing in...';
      btn.disabled = true;

      try {
        if (isSignUp) {
          const { data, error } = await sb.auth.signUp({ email, password });
          if (error) {
            errEl.textContent = error.message;
            errEl.classList.add('show');
            btn.textContent = 'Create account';
            btn.disabled = false;
          } else if (data.user && !data.session) {
            // Email confirmation required -- show the confirm panel
            showConfirmPanel(email);
          } else if (data.session) {
            // Email confirmation disabled -- signed in immediately
            goToDestination();
          }
        } else {
          const { data, error } = await sb.auth.signInWithPassword({ email, password });
          if (error) {
            // Catch the specific "Email not confirmed" error
            if (error.message && error.message.toLowerCase().includes('email not confirmed')) {
              showConfirmPanel(email);
            } else {
              errEl.textContent = error.message;
              errEl.classList.add('show');
              btn.textContent = 'Sign in';
              btn.disabled = false;
            }
          } else {
            goToDestination();
          }
        }
      } catch(e) {
        errEl.textContent = 'Something went wrong. Please try again.';
        errEl.classList.add('show');
        btn.textContent = isSignUp ? 'Create account' : 'Sign in';
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
